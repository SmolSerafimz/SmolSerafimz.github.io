<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmolSerafimz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div id="star-container"></div>
    <div class="site-wrapper">
        
        <header class="header-banner">
            <img src="assets/logo.png" alt="SmolSerafimz Logo" class="logo">
        </header>

        <div class="ticker-zone">
            <div class="ticker-text">
                HIJINKS COMING SOON...
            </div>
        </div>

        <aside class="column">
            <div class="box">
                <div class="box-header">NAVIGATION</div>
                <ul class="nav-links">
                    <li><a href="#">HOME</a></li>
                    <li><a href="#">WIKI</a></li>
                </ul>
            </div>
            
            <div class="box">
                <div class="box-header">SOCIAL MEDIA</div>
                <ul class="nav-links">
                    <li><a href="#">INSTAGRAM</a></li>
                </ul>
            </div>
        </aside>

        <main class="column">
            <div class="box">
                <h2 class="centered-header">Latest Update</h2>
            </div>
            <div class="box featured-content">
                <h2 class="centered-header" id="episode-title">Latest Episode</h2>
                
                <img src="assets/ep21_web.webp" id="main-comic-display" style="width:100%;" alt="Comic Page">
                <div class="panel-nav" id="panel-dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                <div class="reaction-bar">
                    <button class="reaction-btn" title="Like">👍</button>
                    <button class="reaction-btn" title="Love">❤️</button>
                    <button class="reaction-btn" title="Laugh">😂</button>
                    <button class="reaction-btn" title="Shock">😲</button>
                    <button class="reaction-btn" title="Sad">😢</button>
                    <button class="reaction-btn" title="Fire">🔥</button>
                </div>
                
            </div>
            <div class="box">
                <h2 class="centered-header">About Episode</h2>
            </div>
        </main>

        <aside class="column">
            <div class="box">
                <div class="box-header">SITE THEME</div>
                <div class="theme-controls">
                    <span>Day</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-checkbox">
                        <span class="slider"></span>
                    </label>
                    <span>Night</span>
                </div>
            </div>
            <div class="box">
                <div class="box-header">ARCHIVE</div>
                <ul class="nav-links">
                    <li><a href="#">Episode 001</a></li>
                    <li><a href="#">Episode 002</a></li>
                    <li><a href="#">Episode 003</a></li>
                </ul>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
